<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BodyTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const cfg = {
    apiKey:"AIzaSyBIifzTq-H_9WcnwfOvprmFAn6OolSsoh0",
    authDomain:"bodytrack-8d5a6.firebaseapp.com",
    databaseURL:"https://bodytrack-8d5a6-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"bodytrack-8d5a6",
    storageBucket:"bodytrack-8d5a6.firebasestorage.app",
    messagingSenderId:"523792209488",
    appId:"1:523792209488:web:c6e8b9c29ac6efca4e2355"
  };
  const app = initializeApp(cfg);
  const db  = getDatabase(app);
  window._fbSet    = (p,d) => set(ref(db,p),d);
  window._fbListen = (p,cb) => onValue(ref(db,p), s => cb(s.val()));
  window._fbGet    = async p => { const s = await get(ref(db,p)); return s.val(); };
  window._fbReady  = true;
  document.dispatchEvent(new Event('fbReady'));
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --i0:#0e0e12;--i1:#2a2a35;--i2:#52526a;--i3:#9090a8;--i4:#c0c0d0;
  --p0:#ffffff;--p1:#f7f7f5;--p2:#efefe9;--p3:#e2e2da;
  --gold:#b8934a;--gold-l:#f5edd8;--gold-d:#7a5f2a;
  --ok:#2d6a4f;--ok-l:#e8f4ee;
  --warn:#c0392b;--warn-l:#faeae8;
  --line:#00000012;--line2:#0000001e;
  --r:14px;--rs:9px;
  --fs:'Inter',sans-serif;--ff:'Cormorant Garamond',Georgia,serif;--fm:'DM Mono',monospace;
}
.dk{
  --i0:#f0f0f6;--i1:#c8c8de;--i2:#8888a8;--i3:#55556a;--i4:#35353f;
  --p0:#131318;--p1:#1a1a22;--p2:#20202a;--p3:#26263a;
  --gold:#d4a857;--gold-l:#2e2a1a;--gold-d:#e8c87a;
  --ok:#4ade80;--ok-l:#0f2a1a;
  --warn:#f87171;--warn-l:#2a0f0f;
  --line:#ffffff12;--line2:#ffffff1e;
}
body{background:var(--p1);color:var(--i0);font-family:var(--fs);font-size:14px;line-height:1.5;transition:background .25s,color .25s;-webkit-text-size-adjust:100%}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--p1)}
.login-box{background:var(--p0);border:1px solid var(--line2);border-radius:20px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 8px 40px #00000014}
.login-logo{font-family:var(--ff);font-size:26px;font-weight:300;letter-spacing:.14em;text-align:center;margin-bottom:4px;text-transform:uppercase;color:var(--i0)}
.login-logo span{color:var(--gold);font-weight:500}
.login-sub{font-size:11px;color:var(--i3);text-align:center;margin-bottom:28px;font-family:var(--fm);letter-spacing:.08em;text-transform:uppercase}
.role-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.role-btn{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid var(--line2);background:transparent;cursor:pointer;font-family:var(--fs);text-align:left;width:100%;transition:all .18s}
.role-btn:hover{border-color:var(--gold);background:var(--gold-l)}
.role-btn.sel{border-color:var(--gold);background:var(--gold-l)}
.role-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:16px;flex-shrink:0}
.role-name{font-size:14px;font-weight:600;color:var(--i0);margin-bottom:1px}
.role-desc{font-size:11px;color:var(--i2)}
.pw-wrap{margin-bottom:14px}
.pw-wrap label{display:block;font-size:11px;color:var(--i2);text-transform:uppercase;letter-spacing:.05em;font-weight:500;margin-bottom:5px}
.pw-wrap input{width:100%;background:var(--p1);border:1px solid var(--line2);color:var(--i0);border-radius:var(--rs);padding:11px 14px;font-size:14px;font-family:var(--fs);outline:none;transition:border .18s}
.pw-wrap input:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:13px;background:var(--i0);color:var(--p0);border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fs);transition:opacity .18s}
.login-btn:hover{opacity:.85}
.login-err{font-size:12px;color:var(--warn);text-align:center;margin-top:8px;min-height:18px}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:52px;background:var(--p0);border-bottom:1px solid var(--line2);position:sticky;top:0;z-index:100;gap:10px}
.wordmark{font-family:var(--ff);font-size:18px;font-weight:300;letter-spacing:.12em;color:var(--i0);text-transform:uppercase;flex-shrink:0}
.wordmark span{color:var(--gold);font-weight:500}
.topbar-mid{display:flex;align-items:center;gap:6px;flex:1;justify-content:center;min-width:0;overflow:hidden}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--i4);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--ok)}
.sync-dot.busy{background:var(--gold);animation:pulse .8s infinite}
.sync-dot.err{background:var(--warn)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-label{font-size:11px;color:var(--i3);font-family:var(--fm)}
.role-badge{font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:100px;border:1px solid var(--line2);color:var(--i2);white-space:nowrap}
.topbar-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ibtn{width:36px;height:36px;border-radius:8px;background:var(--p0);border:1.5px solid var(--i4);color:var(--i0);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;flex-shrink:0;font-weight:400}
.ibtn:hover{background:var(--p2);border-color:var(--i2);color:var(--i0)}
.ibtn.on{background:var(--gold);border-color:var(--gold);color:#fff}

/* MEMBER BAR */
.mbar{display:flex;align-items:center;gap:6px;padding:10px 18px 0;background:var(--p0);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.mbar::-webkit-scrollbar{display:none}
.mchip{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:100px;border:1px solid var(--line2);background:transparent;cursor:pointer;white-space:nowrap;font-size:13px;color:var(--i2);font-family:var(--fs);transition:all .18s;flex-shrink:0}
.mchip:hover{color:var(--i0);border-color:var(--i4)}
.mchip.sel{color:var(--p0);border-color:transparent}
.mchip.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.mchip .av{width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}
.add-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:100px;border:1.5px dashed var(--i4);background:transparent;cursor:pointer;white-space:nowrap;font-size:12px;color:var(--i3);font-family:var(--fs);transition:all .18s;flex-shrink:0}
.add-chip:hover{border-color:var(--gold);color:var(--gold)}

/* TABS */
.tabs{display:flex;padding:0 18px;background:var(--p0);border-bottom:1px solid var(--line2);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 14px;font-size:13px;color:var(--i3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s;flex-shrink:0;white-space:nowrap}
.tab:hover{color:var(--i1)}
.tab.sel{color:var(--i0);border-bottom-color:var(--gold);font-weight:500}

/* COACH HEADER */
.coach-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--p0);border-bottom:1px solid var(--line2)}
.coach-label{font-family:var(--fm);font-size:11px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
.coach-date{font-size:12px;color:var(--i3)}

/* PAGE */
.page{padding:16px 18px;max-width:900px;margin:0 auto}
.sh{font-family:var(--fm);font-size:11px;color:var(--i3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;margin-top:2px}

/* STAT CARDS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px;margin-bottom:14px}
.sc{background:var(--p0);border:1px solid var(--line2);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.sc-bar{position:absolute;top:0;left:0;right:0;height:3px}
.sc-lbl{font-size:10px;color:var(--i3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.sc-val{font-family:var(--fs);font-size:30px;font-weight:700;color:var(--i0);line-height:1;margin-bottom:3px;font-variant-numeric:tabular-nums}
.sc-unit{font-size:12px;color:var(--i2);font-weight:400}
.sc-sub{font-size:11px;color:var(--i3);margin-bottom:5px}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:100px}
.pill-ok{background:var(--ok-l);color:var(--ok)}
.pill-warn{background:var(--warn-l);color:var(--warn)}
.pill-gold{background:var(--gold-l);color:var(--gold-d)}

/* LEADERBOARD */
.lb-wrap{background:var(--p0);border:1px solid var(--line2);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.lb-hd{padding:12px 16px;border-bottom:1px solid var(--line2)}
.lb-hd-title{font-family:var(--fm);font-size:10px;color:var(--i3);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.lb-hd-rule{font-size:11px;color:var(--i3);margin-top:3px}
.lb-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);gap:12px;cursor:pointer;transition:background .15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--p1)}
.lb-rank{font-family:var(--ff);font-size:24px;font-weight:300;min-width:32px;color:var(--i3);line-height:1}
.lb-av{width:34px;height:34px;border-radius:50%;font-family:var(--ff);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-family:var(--ff);font-size:17px;font-weight:400;color:var(--i0)}
.lb-detail{font-family:var(--fm);font-size:10px;color:var(--i3);margin-top:2px}
.lb-right{text-align:right;flex-shrink:0}
.lb-score{font-family:var(--fs);font-size:26px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.lb-score-lbl{font-family:var(--fm);font-size:10px;color:var(--i3)}
.lb-bar-wrap{width:60px;height:3px;background:var(--p3);border-radius:2px;margin-top:5px;margin-left:auto}
.lb-bar-fill{height:100%;border-radius:2px}

/* SCORE HERO */
.score-hero{background:var(--p0);border:1px solid var(--line2);border-radius:var(--r);padding:24px;margin-bottom:14px;text-align:center}
.score-eyebrow{font-family:var(--fm);font-size:10px;color:var(--i3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.score-number{font-family:var(--fs);font-size:72px;font-weight:700;line-height:1;margin-bottom:5px;font-variant-numeric:tabular-nums;letter-spacing:-.03em}
.score-tagline{font-size:12px;color:var(--i3)}
.score-bands{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.band{border:1px solid var(--line2);border-radius:var(--rs);padding:14px}
.band-lbl{font-family:var(--fm);font-size:10px;color:var(--i3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.band-w{font-family:var(--fm);font-size:10px;color:var(--gold);display:block;margin-bottom:8px}
.band-val{font-family:var(--fs);font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
.band-unit{font-size:12px;color:var(--i2);font-weight:400}
.band-track{height:4px;background:var(--p3);border-radius:2px;overflow:hidden;margin:8px 0}
.band-fill{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.band-foot{display:flex;justify-content:space-between;font-family:var(--fm);font-size:10px;color:var(--i3)}
.band-score{font-family:var(--fs);font-size:18px;font-weight:700;margin-top:6px;font-variant-numeric:tabular-nums}
.band-score-lbl{font-family:var(--fm);font-size:10px;color:var(--i3)}

/* CHART */
.cc{background:var(--p0);border:1px solid var(--line2);border-radius:var(--r);padding:18px;margin-bottom:14px}
.cc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.cc-title{font-family:var(--fm);font-size:10px;color:var(--i3);letter-spacing:.08em;text-transform:uppercase}
.ctog{display:flex;gap:4px}
.ctbtn{padding:4px 10px;border-radius:6px;border:1px solid var(--line2);background:transparent;color:var(--i3);font-size:11px;cursor:pointer;font-family:var(--fm);transition:all .15s}
.ctbtn.sel{background:var(--i0);color:var(--p0);border-color:var(--i0)}

/* GOAL BARS */
.gi{background:var(--p0);border:1px solid var(--line2);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.gi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.gi-name{font-size:13px;color:var(--i1);font-weight:500}
.gi-pct{font-family:var(--fm);font-size:14px;color:var(--i0)}
.track{height:4px;background:var(--p3);border-radius:2px;overflow:hidden;margin-bottom:7px}
.fill{height:100%;border-radius:2px;transition:width .9s cubic-bezier(.4,0,.2,1)}
.gi-foot{display:flex;justify-content:space-between;font-size:10px;color:var(--i3);font-family:var(--fm)}

/* FORM */
.iform{background:var(--p0);border:1px solid var(--line2);border-radius:var(--r);padding:18px;margin-bottom:14px}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.span2{grid-column:span 2}
.ig label{display:block;font-size:11px;color:var(--i2);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px;font-weight:500}
.ig input,.ig select,.ig textarea{width:100%;background:var(--p1);border:1px solid var(--line2);color:var(--i0);border-radius:var(--rs);padding:9px 11px;font-size:14px;font-family:var(--fs);outline:none;transition:border .18s;-webkit-appearance:none}
.ig input:focus,.ig textarea:focus,.ig select:focus{border-color:var(--gold)}
.ig input::placeholder{color:var(--i4)}
.ig textarea{resize:vertical;min-height:68px}
.isec{font-family:var(--fm);font-size:10px;color:var(--i3);text-transform:uppercase;letter-spacing:.1em;grid-column:span 2;padding:8px 0 2px;border-top:1px solid var(--line);margin-top:4px}
.sbtn{width:100%;padding:12px;background:var(--i0);color:var(--p0);border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fs);transition:opacity .18s,transform .1s}
.sbtn:hover{opacity:.85}
.sbtn:active{transform:scale(.99)}
.sec-btn{width:100%;padding:10px;margin-top:8px;background:transparent;color:var(--i2);border:1px solid var(--line2);border-radius:var(--rs);font-size:13px;cursor:pointer;font-family:var(--fs);transition:all .18s}
.sec-btn:hover{background:var(--p2);color:var(--i0)}

/* INBODY UPLOAD */
.inbody-zone{border:1.5px dashed var(--line2);background:var(--p1);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .18s;margin-bottom:14px}
.inbody-zone:hover{border-color:var(--gold);background:var(--gold-l)}
.ai-loading{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--p1);border-radius:var(--rs);font-size:13px;color:var(--i2);margin-bottom:12px}
.ai-ok{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--ok-l);border-radius:var(--rs);font-size:13px;color:var(--ok);margin-bottom:12px}
.ai-err{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--warn-l);border-radius:var(--rs);font-size:13px;color:var(--warn);margin-bottom:12px}
.spinner{width:14px;height:14px;border:2px solid var(--i4);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOGGLE */
.trow{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;user-select:none}
.ttrack{width:40px;height:22px;border-radius:11px;position:relative;transition:background .2s;flex-shrink:0;background:var(--p3)}
.ttrack.on{background:var(--gold)}
.tthumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px #00000030}
.ttrack.on .tthumb{transform:translateX(18px)}
.tlabel{font-size:13px;color:var(--i1);font-weight:500}

/* NOTES */
.ncard{background:var(--p0);border:1px solid var(--line2);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.ndate{font-family:var(--fm);font-size:10px;color:var(--i3);margin-bottom:5px;letter-spacing:.06em}
.ntext{font-size:14px;color:var(--i1);line-height:1.65}
.ntags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.ntag{font-size:11px;padding:3px 8px;border-radius:100px}
.ntag.ok{color:var(--ok);background:var(--ok-l)}
.ntag.warn{color:var(--warn);background:var(--warn-l)}

/* COACH CARDS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.ccard{background:var(--p0);border:1px solid var(--line2);border-radius:var(--r);padding:18px}
.ccard-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.cav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:17px;flex-shrink:0}
.cmeta{flex:1;min-width:0}
.cname{font-family:var(--ff);font-size:21px;font-weight:300;color:var(--i0);line-height:1.1}
.csub{font-size:11px;color:var(--i3);margin-top:2px;font-family:var(--fm)}
.csg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.csi{background:var(--p1);border-radius:var(--rs);padding:9px 11px}
.csi-l{font-size:10px;color:var(--i3);text-transform:uppercase;letter-spacing:.07em;font-family:var(--fm);margin-bottom:2px}
.csi-v{font-family:var(--fs);font-size:19px;font-weight:700;color:var(--i0);font-variant-numeric:tabular-nums}
.csi-u{font-size:11px;color:var(--i2);font-weight:400}
.csi-d{font-family:var(--fm);font-size:10px;margin-top:2px}
.clast{border-top:1px solid var(--line);padding-top:10px}
.clast-d{font-family:var(--fm);font-size:10px;color:var(--i3);margin-bottom:3px}
.clast-t{font-size:12px;color:var(--i2);line-height:1.5}

/* DIST */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.dcard{background:var(--p0);border:1px solid var(--line2);border-radius:var(--r);padding:14px}
.dcard-title{font-family:var(--fm);font-size:10px;color:var(--i3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px}
.drow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.drow:last-child{margin-bottom:0}
.dlbl{font-size:11px;color:var(--i2);min-width:26px}
.dbar-wrap{flex:1;height:5px;background:var(--p3);border-radius:3px;overflow:hidden}
.dbar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.dval{font-family:var(--fm);font-size:10px;color:var(--i1);min-width:40px;text-align:right}

/* HISTORY ROW */
.hrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.hrow:last-child{border-bottom:none}
.hdate{font-family:var(--fm);font-size:10px;color:var(--i3)}
.hvals{font-size:12px;color:var(--i1)}

/* MODAL */

<script>
/* ── ROLES & AUTH ── */
const ROLES = {
  erin:  { label:'Erin',  canAdd:true,  isCoach:false, canSeeAll:true  },
  henry: { label:'Henry', canAdd:false, isCoach:false, canSeeAll:false },
  coach: { label:'教練',  canAdd:false, isCoach:true,  canSeeAll:true  },
};
let currentRole = null, selectedRole = null;

function selectRole(r, el) {
  selectedRole = r;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('pwInput').focus();
  document.getElementById('loginErr').textContent = '';
}
async function doLogin() {
  if (!selectedRole) { document.getElementById('loginErr').textContent = '請先選擇角色'; return; }
  const pw = document.getElementById('pwInput').value;
  if (!pw) { document.getElementById('loginErr').textContent = '請輸入密碼'; return; }

  // Show loading state
  const btn = document.querySelector('.login-btn');
  btn.textContent = '驗證中...'; btn.disabled = true;

  try {
    // Fetch password from Firebase
    let savedPw = null;
    if (window._fbGet) {
      savedPw = await window._fbGet('roles/' + selectedRole + '/pw');
    }
    // Fallback: if Firebase not ready or no pw stored yet, block login
    if (savedPw === null || savedPw === undefined) {
      document.getElementById('loginErr').textContent = '無法連線，請稍後再試';
      btn.textContent = '進入'; btn.disabled = false;
      return;
    }
    // Hash the input password and compare
    const pwHash = await sha256(pw);
    console.log('input hash:', pwHash);
    console.log('saved hash:', savedPw);
    console.log('match:', pwHash === savedPw);
    if (pwHash !== savedPw) {
      document.getElementById('loginErr').textContent = '密碼錯誤 (debug: check console)';
      document.getElementById('pwInput').value = '';
      btn.textContent = '進入'; btn.disabled = false;
      return;
    }
    currentRole = selectedRole;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    initApp();
  } catch(e) {
    document.getElementById('loginErr').textContent = '連線錯誤，請重試';
    btn.textContent = '進入'; btn.disabled = false;
  }
}
function doLogout() {
  currentRole = null; selectedRole = null;
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('loginErr').textContent = '';
  killCharts();
}

/* ── SCORE ENGINE ── */
const FAT_PER=2, FAT_MAX=8, MUS_PER=0.5, MUS_MAX=2;
function getScore(id) {
  const d = DB[id];
  if (!d) return {score:0,fatDrop:0,musGain:0,fatScore:0,musScore:0,fatStart:0,musStart:0};
  const fatStart = d.history?.[0]?.bodyfat ?? d.stats.bodyfat;
  const musStart = d.history?.[0]?.muscle  ?? d.stats.muscle;
  const fatDrop  = +(fatStart - d.stats.bodyfat).toFixed(2);
  const musGain  = +(d.stats.muscle - musStart).toFixed(2);
  const fatScore = +Math.min(FAT_MAX, Math.max(0, fatDrop * FAT_PER)).toFixed(2);
  const musScore = +Math.min(MUS_MAX, Math.max(0, musGain * MUS_PER)).toFixed(2);
  return {id, fatDrop, musGain, fatStart, musStart, fatScore, musScore, score:+(fatScore+musScore).toFixed(1)};
}
function getRanking() {
  return Object.keys(DB).filter(id=>DB[id].inContest)
    .map(id=>({...getScore(id), d:DB[id]}))
    .sort((a,b)=>b.score-a.score)
    .map((s,i)=>({...s, rank:i+1}));
}

/* ── DEFAULT DATA ── */
const PALETTE=['#b8934a','#2d6a4f','#1a1a2e','#c0392b','#4a6fa5','#7b5e8a','#5a8a6a','#8a5a4a'];
let quotaFailCount = parseInt(localStorage.getItem('bt_quota_fails')||'0');
let userApiKey = localStorage.getItem('bt_api_key') || '';
let pickColor=PALETTE[0], modalContest=true;
let isDark=false, coachMode=false, curId='erin', curTab='dash', chartType='fat';
let charts={};

let DB = {
  erin:{name:'Erin',color:'#b8934a',sex:'F',age:0,height:0,inContest:true,
    stats:{weight:0,bodyfat:0,muscle:0},targets:{weight:0,bodyfat:0,muscle:0},
    history:[],notes:[]},
  henry:{name:'Henry',color:'#2d6a4f',sex:'M',age:0,height:0,inContest:true,
    stats:{weight:0,bodyfat:0,muscle:0},targets:{weight:0,bodyfat:0,muscle:0},
    history:[],notes:[]}
};

/* ── FIREBASE ── */
function setSyncStatus(s){
  const dot=document.getElementById('syncDot'), lbl=document.getElementById('syncLabel');
  if(!dot) return;
  dot.className='sync-dot '+s;
  lbl.textContent=s==='ok'?'已同步':s==='busy'?'同步中...':'離線';
}
function fbSave(id){
  if(!window._fbSet) return;
  setSyncStatus('busy');
  window._fbSet('members/'+id, DB[id]).then(()=>setSyncStatus('ok')).catch(()=>setSyncStatus('err'));
}
function startSync(){
  if(!window._fbListen) return;
  let lastSnapshot = null;
  window._fbListen('members', val => {
    if(val && Object.keys(val).length > 0){
      const snapshot = JSON.stringify(val);
      if(snapshot === lastSnapshot){ setSyncStatus('ok'); return; }
      lastSnapshot = snapshot;
      DB = val;
      if(!DB[curId]) curId = Object.keys(DB)[0];
      renderMbar();
      const active = document.activeElement;
      const isTyping = active && (active.tagName==='INPUT'||active.tagName==='TEXTAREA'||active.tagName==='SELECT');
      if(!isTyping){ coachMode ? renderCoach() : renderPage(); }
    } else {
      // Firebase empty — write default members
      window._fbSet('members', DB).then(()=>setSyncStatus('ok')).catch(()=>setSyncStatus('err'));
    }
    setSyncStatus('ok');
  });
}
async function loadSavedRoles(){
  if(!window._fbGet) return;
  try {
    const saved = await window._fbGet('roles');
    if(!saved) return;
    Object.entries(saved).forEach(([id,role])=>{
      if(!ROLES[id]){
        // Ensure new members can only see themselves
        ROLES[id] = Object.assign({canSeeAll:false, canAdd:false, isCoach:false}, role);
      }
      addRoleBtn(id, role.label, DB[id]?.color||'#888');
    });
  } catch(e){}
}

/* ── APP INIT ── */
function initApp(){
  const role=ROLES[currentRole];
  document.getElementById('roleBadge').textContent=role.label;
  if(role.isCoach){
    coachMode=true;
    document.getElementById('normalUI').style.display='none';
    document.getElementById('coachUI').style.display='block';
    document.getElementById('coachDateEl').textContent=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
  } else {
    coachMode=false;
    document.getElementById('normalUI').style.display='block';
    document.getElementById('coachUI').style.display='none';
    curId=currentRole;
  }
  if(window._fbReady){ startSync(); loadSavedRoles(); }
  else document.addEventListener('fbReady',()=>{ startSync(); loadSavedRoles(); },{once:true});
  setSyncStatus('busy');
  renderTabs();
  renderMbar();
  coachMode ? renderCoach() : renderPage();
  // Load Gemini key from Firebase
  loadGeminiKey();
  // Check quota warning for Erin
  if(ROLES[currentRole]?.canAdd && window._fbGet){
    window._fbGet('settings/quota_warning').then(function(val){
      if(val && val.count >= 5){
        quotaFailCount = val.count;
        localStorage.setItem('bt_quota_fails', quotaFailCount);
        showQuotaAlert();
      }
    }).catch(function(){});
  }
}

/* ── HELPERS ── */
function ini(n){return(n||'?').slice(0,1).toUpperCase()}
function bmiOf(id){const d=DB[id];return d?.height?(d.stats.weight/Math.pow(d.height/100,2)).toFixed(1):'—'}
function scoreCol(s,col){return s>=7?col:s>=4?'var(--gold)':'var(--warn)'}
const MEDALS=['🥇','🥈','🥉'];
function loadGeminiKey(){
  if(!window._fbGet) {
    document.addEventListener('fbReady', loadGeminiKey, {once:true});
    return Promise.resolve();
  }
  return window._fbGet('settings').then(function(val){
    if(val){
      if(val.gemini_key){
        userApiKey = val.gemini_key;
        localStorage.setItem('bt_api_key', val.gemini_key);
      }
      if(val.api_provider){
        localStorage.setItem('bt_api_provider', val.api_provider);
      }
    }
  }).catch(function(){});
}

function canManage(){return!!(currentRole&&ROLES[currentRole]&&ROLES[currentRole].canAdd===true)}

function renderMemberMgmt(){
  const rows = Object.keys(DB).map(function(id){
    const d = DB[id];
    const isSelf = (id === currentRole);
    const tcVal = String(!d.inContest);
    const tcBorder = d.inContest ? 'var(--ok)' : 'var(--line2)';
    const tcBg = d.inContest ? 'var(--ok-l)' : 'transparent';
    const tcColor = d.inContest ? 'var(--ok)' : 'var(--i3)';
    const contestBtn = '<button onclick="toggleContest(\'' + id + '\',' + tcVal + ')" style="padding:3px 10px;border-radius:100px;font-size:11px;cursor:pointer;font-family:var(--fs);border:1px solid ' + tcBorder + ';background:' + tcBg + ';color:' + tcColor + '">' + (d.inContest ? '✓ 參賽中' : '未參賽') + '</button>';
    const editBtn = '<button onclick="openEditMember(\'' + id + '\')" style="padding:3px 10px;background:transparent;border:1px solid var(--line2);color:var(--i2);border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--fs)">編輯</button>';
    const delBtn = isSelf ? '' : '<button onclick="deleteMember(\'' + id + '\')" style="padding:3px 10px;background:transparent;border:1px solid var(--warn-l);color:var(--warn);border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--fs)">刪除</button>';
    const histCount = (d.history||[]).length;
    const delHistBtn = histCount > 0
      ? '<button onclick="openDeleteHistory(\'' + id + '\')" style="padding:3px 10px;background:transparent;border:1px solid var(--line2);color:var(--i3);border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--fs)">紀錄 (' + histCount + ')</button>'
      : '';
    return '<div style="padding:11px 0;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:7px">'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<div style="width:28px;height:28px;border-radius:50%;background:' + d.color + '18;color:' + d.color + ';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">' + ini(d.name) + '</div>'
      + '<span style="flex:1;font-size:13px;font-weight:500;color:var(--i0)">' + d.name + (isSelf ? ' <span style="font-size:10px;color:var(--i3);font-weight:400">(我)</span>' : '') + '</span>'
      + '<span style="font-size:11px;color:var(--i3);font-family:var(--fm)">' + (d.age||'—') + '歲 · ' + (d.height||'—') + 'cm</span>'
      + '</div>'
      + '<div style="display:flex;gap:6px;flex-wrap:wrap;padding-left:36px">'
      + contestBtn + editBtn + delHistBtn + delBtn
      + '</div>'
      + '</div>';
  }).join('');
  return '<div class="sh" style="margin-top:4px">成員管理</div>'
    + '<div class="iform" style="padding:14px 16px">' + rows + '</div>';
}

function openEditMember(id){
  const d = DB[id];
  const existing = document.getElementById('memberModal');
  if(existing) existing.remove();
  const ov = document.createElement('div');
  ov.className = 'modal-overlay'; ov.id = 'memberModal';
  ov.innerHTML = '<div class="modal">'
    + '<div class="modal-title">編輯 — ' + d.name + '</div>'
    + '<div class="igrid">'
    + '<div class="ig"><label>姓名</label><input id="em_name" value="' + d.name + '" maxlength="12"></div>'
    + '<div class="ig"><label>性別</label><select id="em_sex"><option value="F"' + (d.sex==='F'?' selected':'') + '>女</option><option value="M"' + (d.sex==='M'?' selected':'') + '>男</option></select></div>'
    + '<div class="ig"><label>年齡</label><input id="em_age" type="number" value="' + (d.age||'') + '"></div>'
    + '<div class="ig"><label>身高 (cm)</label><input id="em_height" type="number" step="0.1" value="' + (d.height||'') + '"></div>'
    + '<div class="ig"><label>目標體重 (kg) <span style=\"font-size:10px;color:var(--i3)\">選填</span></label><input id="em_tw" type="number" step="0.1" placeholder="' + (d.targets.weight||'未設定') + '"></div>'
    + '<div class="ig"><label>目標體脂率 (%) <span style=\"font-size:10px;color:var(--i3)\">選填</span></label><input id="em_tf" type="number" step="0.1" placeholder="' + (d.targets.bodyfat||'未設定') + '"></div>'
    + '<div class="ig span2"><label>目標肌肉量 (kg) <span style=\"font-size:10px;color:var(--i3)\">選填</span></label><input id="em_tm" type="number" step="0.1" placeholder="' + (d.targets.muscle||'未設定') + '"></div>'
    + '</div>'
    + '<button class="sbtn" onclick="saveEditMember(\'' + id + '\')">儲存變更</button>'
    + '<button class="sec-btn" onclick="closeModal()">取消</button>'
    + '</div>';
  document.body.appendChild(ov);
  ov.addEventListener('click', function(e){ if(e.target===ov) closeModal(); });
}

function saveEditMember(id){
  const d = DB[id];
  const name   = document.getElementById('em_name').value.trim();
  const sex    = document.getElementById('em_sex').value;
  const age    = parseInt(document.getElementById('em_age').value) || 0;
  const height = parseFloat(document.getElementById('em_height').value) || 0;
  const tw     = parseFloat(document.getElementById('em_tw').value);
  const tf     = parseFloat(document.getElementById('em_tf').value);
  const tm     = parseFloat(document.getElementById('em_tm').value);
  if(!name){ toast('請輸入姓名'); return; }
  d.name = name; d.sex = sex; d.age = age; d.height = height;
  if(tw) d.targets.weight  = tw;
  if(tf) d.targets.bodyfat = tf;
  if(tm) d.targets.muscle  = tm;
  // Update login role label
  if(ROLES[id]) ROLES[id].label = name;
  if(window._fbSet) window._fbSet('roles/' + id + '/label', name);
  fbSave(id);
  closeModal();
  renderMbar();
  toast(name + ' 資料已更新');
  renderPage();
}

function openDeleteHistory(id){
  const d = DB[id];
  const hist = d.history || [];
  const existing = document.getElementById('memberModal');
  if(existing) existing.remove();
  const ov = document.createElement('div');
  ov.className = 'modal-overlay'; ov.id = 'memberModal';
  const rows = hist.map(function(h, i){
    return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)">'
      + '<span style="font-family:var(--fm);font-size:11px;color:var(--i3);flex:0 0 80px">' + h.date + '</span>'
      + '<span style="flex:1;font-size:12px;color:var(--i1)">' + h.weight + 'kg · ' + h.bodyfat + '% · ' + h.muscle + 'kg</span>'
      + '<button onclick="deleteHistoryEntry(\'' + id + '\',' + i + ')" style="padding:3px 10px;background:transparent;border:1px solid var(--warn-l);color:var(--warn);border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--fs)">刪除</button>'
      + '</div>';
  }).join('');
  ov.innerHTML = '<div class="modal">'
    + '<div class="modal-title">' + d.name + ' — 量測紀錄</div>'
    + '<div style="max-height:55vh;overflow-y:auto;margin-bottom:14px">'
    + (rows || '<div style="text-align:center;color:var(--i3);padding:20px">尚無紀錄</div>')
    + '</div>'
    + '<button class="sec-btn" onclick="closeModal()" style="margin-top:0">關閉</button>'
    + '</div>';
  document.body.appendChild(ov);
  ov.addEventListener('click', function(e){ if(e.target===ov) closeModal(); });
}

function deleteHistoryEntry(id, idx){
  const d = DB[id];
  if(!confirm('確定刪除這筆紀錄？')) return;
  d.history.splice(idx, 1);
  // Recalculate stats from latest history
  if(d.history.length > 0){
    const latest = d.history[d.history.length - 1];
    d.stats.weight  = latest.weight;
    d.stats.bodyfat = latest.bodyfat;
    d.stats.muscle  = latest.muscle;
    if(latest.bmi)          d.stats.bmi          = latest.bmi;
    if(latest.visceralFat)  d.stats.visceralFat  = latest.visceralFat;

async function analyzeInBody(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const status = document.getElementById('aiStatus');
  const zone = document.getElementById('ibFile').closest('.inbody-zone');
  zone.style.opacity = '.5';
  status.style.display = 'block';
  status.innerHTML = '<div class="ai-loading"><span class="spinner"></span> AI 正在讀取 InBody 數據...</div>';

  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const base64 = e.target.result.split(',')[1];
      const mime = file.type || 'image/jpeg';
      const provider = localStorage.getItem('bt_api_provider') || 'gemini';
      const key = userApiKey;

      // Always fetch latest key from Firebase (works across all devices/users)
      if(window._fbGet){
        try {
          const s = await window._fbGet('settings');
          if(s && s.gemini_key){
            userApiKey = s.gemini_key;
            localStorage.setItem('bt_api_key', s.gemini_key);
            key = s.gemini_key;
            if(s.api_provider) localStorage.setItem('bt_api_provider', s.api_provider);
          }
        } catch(e){}
      }
      if(!key) {
        status.innerHTML = '<div class="ai-err"><i class="fa-solid fa-circle-exclamation"></i> 請 Erin 先在「設定」頁輸入 API Key</div>';
        zone.style.opacity = '1';
        return;
      }

      const PROMPT = 'From this InBody report image, extract values and return ONLY valid JSON, no other text: {"weight":kg or null,"bodyfat":% or null,"muscle":skeletal muscle kg or null,"bmi":number or null,"visceralFat":level number or null,"whr":ratio or null,"muscleArms":kg or null,"muscleTrunk":kg or null,"muscleLegs":kg or null,"fatArms":kg or null,"fatTrunk":kg or null,"fatLegs":kg or null}';

      let rawText = '';

      if(provider === 'openai') {
        // OpenAI GPT-4o — requires dangerouslyAllowBrowser equivalent
        const openaiModel = localStorage.getItem('bt_openai_model') || 'gpt-4o';
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + key,
            'OpenAI-Organization': '',
          },
          body: JSON.stringify({
            model: openaiModel,
            max_tokens: 1024,
            response_format: { type: 'json_object' },
            messages: [{
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: 'data:' + mime + ';base64,' + base64, detail: 'high' } },
                { type: 'text', text: PROMPT }
              ]
            }]
          })
        });
        if(!res.ok){
          const errData = await res.json().catch(()=>({}));
          throw new Error(errData.error?.message || 'OpenAI HTTP ' + res.status);
        }
        const data = await res.json();
        console.log('OpenAI response:', JSON.stringify(data));
        if(data.error){
          const emsg = data.error.message||JSON.stringify(data.error);
          if(emsg.toLowerCase().includes('quota')||emsg.toLowerCase().includes('exceeded')||emsg.toLowerCase().includes('billing')||emsg.toLowerCase().includes('insufficient')){
            quotaFailCount++;
            localStorage.setItem('bt_quota_fails', String(quotaFailCount));
            if(quotaFailCount >= 5) notifyErinQuota();
          }
          throw new Error(emsg);
        }
        rawText = data.choices?.[0]?.message?.content || '';

      } else {
        // Gemini
        const model = localStorage.getItem('bt_gemini_model') || 'gemini-2.5-flash';
        const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + key, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [
              { inline_data: { mime_type: mime, data: base64 } },
              { text: PROMPT }
            ]}],
            generationConfig: { maxOutputTokens: 2048, temperature: 0, responseMimeType: 'application/json' }
          })
        });
        const data = await res.json();
        console.log('Gemini response:', JSON.stringify(data));
        if(data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        // Get text from any part that has it
        const parts = data.candidates?.[0]?.content?.parts || [];
        for(const part of parts) {
          if(part.text && part.text.trim().length > 0) { rawText = part.text; break; }
        }
      }

      console.log('Raw AI text:', rawText);
      if(!rawText) throw new Error('AI 未回傳任何內容');

      // Extract JSON robustly
      let jsonStr = rawText.replace(/```json/g,'').replace(/```/g,'').trim();
      const fb = jsonStr.indexOf('{');
      const lb = jsonStr.lastIndexOf('}');
      if(fb === -1 || lb === -1) throw new Error('回傳內容中找不到 JSON，原始回應：' + rawText.slice(0,100));
      jsonStr = jsonStr.slice(fb, lb + 1);
      const parsed = JSON.parse(jsonStr);

      const map = {weight:'in_w',bodyfat:'in_f',muscle:'in_m',bmi:'in_bmi',visceralFat:'in_vf',whr:'in_whr',muscleArms:'in_ma',muscleTrunk:'in_mt',muscleLegs:'in_ml',fatArms:'in_fa',fatTrunk:'in_ft',fatLegs:'in_fl'};
      const lbls = {weight:'體重',bodyfat:'體脂率',muscle:'骨骼肌',bmi:'BMI',visceralFat:'內臟脂肪',whr:'腰臀比',muscleArms:'手臂肌肉',muscleTrunk:'軀幹肌肉',muscleLegs:'腿部肌肉',fatArms:'手臂脂肪',fatTrunk:'軀幹脂肪',fatLegs:'腿部脂肪'};
      Object.entries(map).forEach(function(pair) {
        const k = pair[0], id = pair[1];
        if(parsed[k] != null) { const el = document.getElementById(id); if(el) el.value = parsed[k]; }
      });
      const found = Object.keys(map).filter(function(k){ return parsed[k] != null; }).map(function(k){ return lbls[k]; }).join('、');
      status.innerHTML = '<div class="ai-ok"><i class="fa-solid fa-circle-check"></i> 已填入：' + (found || '未偵測到數值') + '</div>';

    } catch(err) {
      console.error('InBody error:', err);
      status.innerHTML = '<div class="ai-err"><i class="fa-solid fa-circle-exclamation"></i> 錯誤：' + (err.message || String(err)) + '</div>';
    }
    zone.style.opacity = '1';
  };
  reader.readAsDataURL(file);
}

function addMember(){

  const name=(document.getElementById('am_n').value||'').trim();

  const inContest=modalContest;
  const sex=document.getElementById('am_s').value;

  const height=parseFloat(document.getElementById('am_h').value)||0;
  const w=parseFloat(document.getElementById('am_w').value)||65;
  const f=parseFloat(document.getElementById('am_f2').value)||20;
  const m=parseFloat(document.getElementById('am_m2').value)||42;
  const tw=parseFloat(document.getElementById('am_tw').value)||+(w-3).toFixed(1);
  const tf=parseFloat(document.getElementById('am_tf').value)||+(f-3).toFixed(1);
  const tm=parseFloat(document.getElementById('am_tm').value)||+(m+2).toFixed(1);

  if(!pw){toast('請設定密碼');return}
  const id=name.toLowerCase().replace(/\s+/g,'_')+'_'+Date.now();
  DB[id]={name,color:pickColor,sex,age,height,inContest,
    stats:{weight:w,bodyfat:f,muscle:m},
    targets:{weight:tw,bodyfat:tf,muscle:tm},
    history:[{date:new Date().toISOString().slice(0,10),weight:w,bodyfat:f,muscle:m}],
    notes:[]};
  ROLES[id]={label:name,canAdd:false,isCoach:false,canSeeAll:false};
  if(window._fbSet) window._fbSet('roles/'+id,{pw,label:name,canAdd:false,isCoach:false,canSeeAll:false});

  curId=id; curTab='dash'; fbSave(id); renderMbar();

async function analyzeInBodyCoach(evt){
  const file = evt.target.files[0]; if(!file) return;
  const status = document.getElementById('coachAiStatus');
  const zone = document.getElementById('coachIbFile').closest('.inbody-zone');
  zone.style.opacity = '.5';
  status.style.display = 'block';
  status.innerHTML = '<div class="ai-loading"><span class="spinner"></span> AI 正在讀取 InBody 數據...</div>';
  const reader = new FileReader();
  reader.onload = async function(e){
    try {
      const base64 = e.target.result.split(',')[1];
      const mime = file.type || 'image/jpeg';
      // fetch key from Firebase
      let key = userApiKey;
      if(window._fbGet){
        try { const s = await window._fbGet('settings'); if(s&&s.gemini_key){ key=s.gemini_key; userApiKey=key; } } catch(e2){}
      }
      if(!key){ status.innerHTML='<div class="ai-err"><i class="fa-solid fa-circle-exclamation"></i> 請先設定 API Key</div>'; zone.style.opacity='1'; return; }
      const provider = localStorage.getItem('bt_api_provider')||'gemini';
      const PROMPT = 'From this InBody report image, extract values and return ONLY valid JSON, no other text: {"weight":kg or null,"bodyfat":% or null,"muscle":skeletal muscle kg or null,"bmi":number or null,"visceralFat":level number or null,"whr":ratio or null,"muscleArms":kg or null,"muscleTrunk":kg or null,"muscleLegs":kg or null,"fatArms":kg or null,"fatTrunk":kg or null,"fatLegs":kg or null}';
      let rawText = '';
      if(provider==='openai'){
        const model = localStorage.getItem('bt_openai_model')||'gpt-4o';
        const res = await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,max_tokens:1024,response_format:{type:'json_object'},messages:[{role:'user',content:[{type:'image_url',image_url:{url:'data:'+mime+';base64,'+base64,detail:'high'}},{type:'text',text:PROMPT}]}]})});
        const data = await res.json(); if(data.error){
          const emsg = data.error.message||JSON.stringify(data.error);
          if(emsg.toLowerCase().includes('quota')||emsg.toLowerCase().includes('exceeded')||emsg.toLowerCase().includes('billing')||emsg.toLowerCase().includes('insufficient')){
            quotaFailCount++;
            localStorage.setItem('bt_quota_fails', String(quotaFailCount));
            if(quotaFailCount >= 5) notifyErinQuota();
          }
          throw new Error(emsg);
        }
        rawText = data.choices?.[0]?.message?.content||'';
      } else {
        const model = localStorage.getItem('bt_gemini_model')||'gemini-2.5-flash';
        const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent?key='+key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:mime,data:base64}},{text:PROMPT}]}],generationConfig:{maxOutputTokens:2048,temperature:0,responseMimeType:'application/json'}})});
        const data = await res.json(); if(data.error){
          const emsg = data.error.message||JSON.stringify(data.error);
          if(emsg.toLowerCase().includes('quota')||emsg.toLowerCase().includes('exceeded')||emsg.toLowerCase().includes('billing')){
            quotaFailCount++;
            localStorage.setItem('bt_quota_fails', String(quotaFailCount));
            if(quotaFailCount >= 5) notifyErinQuota();
          }
          throw new Error(emsg);
        }
        const parts = data.candidates?.[0]?.content?.parts||[];
        for(const p of parts){ if(p.text&&p.text.trim()){ rawText=p.text; break; } }
      }
      if(!rawText) throw new Error('AI 未回傳內容');
      let js2 = rawText.replace(/```json/g,'').replace(/```/g,'').trim();
      const fb=js2.indexOf('{'), lb=js2.lastIndexOf('}');
      if(fb===-1||lb===-1) throw new Error('找不到 JSON：'+rawText.slice(0,100));
      const parsed = JSON.parse(js2.slice(fb,lb+1));
      const map={weight:'c_w',bodyfat:'c_f',muscle:'c_m',bmi:'c_bmi',visceralFat:'c_vf',whr:'c_whr',muscleArms:'c_ma',muscleTrunk:'c_mt',muscleLegs:'c_ml',fatArms:'c_fa',fatTrunk:'c_ft',fatLegs:'c_fl'};
      const lbls={weight:'體重',bodyfat:'體脂率',muscle:'骨骼肌',bmi:'BMI',visceralFat:'內臟脂肪',whr:'腰臀比',muscleArms:'手臂肌肉',muscleTrunk:'軀幹肌肉',muscleLegs:'腿部肌肉',fatArms:'手臂脂肪',fatTrunk:'軀幹脂肪',fatLegs:'腿部脂肪'};
      Object.entries(map).forEach(function(pair){ if(parsed[pair[0]]!=null){const el=document.getElementById(pair[1]);if(el)el.value=parsed[pair[0]];} });
      const found = Object.keys(map).filter(function(k){return parsed[k]!=null;}).map(function(k){return lbls[k];}).join('、');
      status.innerHTML='<div class="ai-ok"><i class="fa-solid fa-circle-check"></i> 已填入：'+(found||'未偵測到數值')+'</div>';
    } catch(err){
      status.innerHTML='<div class="ai-err"><i class="fa-solid fa-circle-exclamation"></i> 錯誤：'+err.message+'</div>';
    }
    zone.style.opacity='1';
  };
  reader.readAsDataURL(file);
}

function saveCoachRecord(){
  const id = coachUploadTarget;
  const isSelf = (id === '__self__');
  if(!isSelf && (!id||!DB[id])){ toast('請先選擇成員'); return; }
  const d = isSelf ? {name:'自己',stats:{weight:0,bodyfat:0,muscle:0},history:[],notes:[]} : DB[id];
  const date = document.getElementById('c_d').value;
  const w   = parseFloat(document.getElementById('c_w').value);
  const f   = parseFloat(document.getElementById('c_f').value);
  const m   = parseFloat(document.getElementById('c_m').value);
  const bmi = parseFloat(document.getElementById('c_bmi').value);
  const vf  = parseFloat(document.getElementById('c_vf').value);
  const whr = parseFloat(document.getElementById('c_whr').value);
  const ma  = parseFloat(document.getElementById('c_ma').value);
  const mt  = parseFloat(document.getElementById('c_mt').value);
  const ml  = parseFloat(document.getElementById('c_ml').value);
  const fa  = parseFloat(document.getElementById('c_fa').value);
  const ft  = parseFloat(document.getElementById('c_ft').value);
  const fl  = parseFloat(document.getElementById('c_fl').value);
  const n   = document.getElementById('c_n').value.trim();
  if(!w&&!f&&!m){ toast('請至少輸入一項數值'); return; }

  if(!isSelf && coachUploadPublic){
    // Save to member's public data
    const entry = {date, weight:w||d.stats.weight, bodyfat:f||d.stats.bodyfat, muscle:m||d.stats.muscle};
    if(bmi)entry.bmi=bmi; if(vf)entry.visceralFat=vf; if(whr)entry.whr=whr;
    if(ma)entry.muscleArms=ma; if(mt)entry.muscleTrunk=mt; if(ml)entry.muscleLegs=ml;
    if(fa)entry.fatArms=fa; if(ft)entry.fatTrunk=ft; if(fl)entry.fatLegs=fl;
    if(!d.history) d.history=[];
    d.history.push(entry); d.history.sort(function(a,b){return a.date.localeCompare(b.date);});
    if(w)d.stats.weight=w; if(f)d.stats.bodyfat=f; if(m)d.stats.muscle=m;
    if(bmi)d.stats.bmi=bmi; if(vf)d.stats.visceralFat=vf; if(whr)d.stats.whr=whr;
    if(ma)d.stats.muscleArms=ma; if(mt)d.stats.muscleTrunk=mt; if(ml)d.stats.muscleLegs=ml;
    if(fa)d.stats.fatArms=fa; if(ft)d.stats.fatTrunk=ft; if(fl)d.stats.fatLegs=fl;
    if(n){if(!d.notes)d.notes=[];d.notes.unshift({date,text:'[教練] '+n,tags:['教練備注']});}
    fbSave(id);
    toast(DB[id].name + ' 數據已儲存並同步 ✓');
  } else {
    // Save as private note (either coach toggled private, or self-upload)
    if(!DB['coach']) DB['coach']={name:'教練',color:'#b8934a',notes:[]};
    if(!DB['coach'].notes) DB['coach'].notes=[];
    const memberLabel = isSelf ? '教練' : DB[id].name;
    const note = '[私人紀錄 ' + memberLabel + ' ' + date + '] 體重:' + (w||'—') + ' 體脂:' + (f||'—') + '% 肌肉:' + (m||'—') + 'kg' + (n?' — '+n:'');
    DB['coach'].notes.unshift({date,text:note,tags:['私人','教練']});
    fbSave('coach');
    toast('已儲存為教練私人紀錄（不同步給成員）');
  }
  renderCoachUpload();
}

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

  loadSavedRoles();
}, {once:true});
if(window._fbReady){ initDefaultPasswords(); loadSavedRoles(); }
</script>
